<!DOCTYPE html>
<html>
<head>
    <title>Library Display Collective</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #faf8f5;
        }

        h1 {
            color: #3b3b3b;
        }

        .display-grid {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            width: 250px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px #ddd;
        }

        .tag {
            display: inline-block;
            background: #e8e2d6;
            padding: 5px 10px;
            border-radius: 20px;
            margin: 3px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<h1>Library Display Collective</h1>

<p>A community showcase of creative library displays.</p>

<a href="submit.html">Submit a Display</a>

<br><br>

<h2>Featured Displays</h2>

<div class="display-grid" id="display-container">

</div>

<script>
fetch('data/displays.json')
.then(response => response.json())
.then(displays => {

    const container = document.getElementById('display-container');

    displays.forEach(display => {

        const card = document.createElement('div');
        card.className = 'card';

        card.innerHTML = `
            <h3>${display.title}</h3>

            <p>${display.description}</p>

            <span class="tag">${display.season}</span>
            <span class="tag">${display.audience}</span>
            <span class="tag">${display.theme}</span>

            <br><br>

            <a href="${display.page}">View Display</a>
        `;

        container.appendChild(card);

    });

});
</script>

</body>
</html>
