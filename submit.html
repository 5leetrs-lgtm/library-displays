<!DOCTYPE html>
<html>

<head>
    <title>Submit a Library Display</title>
</head>

<body>

<h1>Submit a Library Display</h1>

<p>
Share a display you are proud of with library staff everywhere!
</p>

<form>

<label>Display Title</label><br>
<input type="text"><br><br>

<label>Description</label><br>
<textarea></textarea><br><br>

<label>Library Name (optional)</label><br>
<input type="text"><br><br>

<label>State</label><br>
<input type="text"><br><br>

<label>Audience</label><br>
<select>
<option>Children</option>
<option>Teen</option>
<option>Adult</option>
<option>All Ages</option>
</select>

<br><br>

<label>Season</label><br>
<select>
<option>Spring</option>
<option>Summer</option>
<option>Fall</option>
<option>Winter</option>
</select>

<br><br>

<button type="submit">Submit Display</button>

</form>

</body>

</html>
