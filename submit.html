<!DOCTYPE html>
<html>

<head>
    <title>Submit a Library Display</title>
</head>

<body>

<h1>Submit a Library Display</h1>

<p>
Share a display you are proud of with library staff everywhere!
</p>

<form>

<label>Display Title</label><br>
<input type="text"><br><br>

<label>Description</label><br>
<textarea></textarea><br><br>

<label>Library Name (optional)</label><br>
<input type="text"><br><br>

<label>State</label><br>
<input type="text"><br><br>

<label>Audience</label><br>
<select>
<option>Children</option>
<option>Teen</option>
<option>Adult</option>
<option>All Ages</option>
</select>

<br><br>

<label>Season</label><br>
<select>
<option>Spring</option>
<option>Summer</option>
<option>Fall</option>
<option>Winter</option>
</select>

<br><br>

<br><br>

<label>Library Type</label><br>
<select>
<option>Public Library</option>
<option>School Library</option>
<option>Academic Library</option>
<option>Special Library</option>
</select>

<br><br>

<label>Display Size</label><br>
<select>
<option>Shelf Display</option>
<option>Endcap</option>
<option>Table Display</option>
<option>Wall Display</option>
<option>Window Display</option>
<option>Room Display</option>
</select>

<br><br>

<label>Budget</label><br>
<select>
<option>Free</option>
<option>Under $10</option>
<option>$10-$25</option>
<option>$25-$50</option>
<option>$50+</option>
</select>

<br><br>

<label>Theme</label><br>
<input type="text" placeholder="Example: Mystery, Fantasy, Gardening">

<br><br>

<label>Tags</label><br>
<input type="text" placeholder="Example: pumpkins, cozy, fall">

<br><br>

<label>Materials Used</label><br>
<input type="text" placeholder="Example: Cricut, cardstock, recycled materials">
    
<button type="submit">Submit Display</button>

</form>

</body>

</html>
